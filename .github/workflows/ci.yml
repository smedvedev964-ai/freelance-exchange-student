name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --max-complexity=10 --max-line-length=127 --statistics || echo "Lint warnings found, but continuing"

      - name: Run tests with pytest
        run: |
          pip install pytest pytest-cov
          pytest tests/ --cov=src --cov-report=xml || echo "No tests yet or tests failed"

      - name: Check app can import
        run: |
          python -c "import src.main"
name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/*.py || echo "No Python files yet"
      
      - name: Print success
        run: echo "CI is working fine!"